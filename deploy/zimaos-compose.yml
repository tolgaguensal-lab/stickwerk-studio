services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://stickwerk_user:${POSTGRES_PASSWORD}@db:5432/stickwerk_db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: https://sws.guenlab.de
      AUTH_TRUST_HOST: "true"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  db:
    image: postgres:15-alpine
    container_name: stickwerk-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: stickwerk_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: stickwerk_db
    volumes:
      - stickwerk-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickwerk_user -d stickwerk_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  stickwerk-db-data:
