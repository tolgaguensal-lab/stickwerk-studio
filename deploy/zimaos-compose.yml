services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "3034:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      DATABASE_URL: postgresql://stickwerk:stickwerk@host.docker.internal:5432/stickwerk
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_USER: ${ADMIN_USER}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      NEXT_PUBLIC_SITE_URL: https://sws.guenlab.de
      NEXT_PUBLIC_APP_URL: https://sws.guenlab.de
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
