name: stickwerk-studio

services:
  app:
    container_name: stickwerk-app
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    restart: unless-stopped
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
      - "casaos.name=Stickwerk-Studio"
      - "casaos.title=Stickwerk-Studio"
      - "casaos.description=Patches &amp; Stickerei Konfigurator — Lead-Management &amp; Admin-Dashboard"
      - "casaos.icon=https://raw.githubusercontent.com/tolgaguensal-lab/stickwerk-studio/main/public/favicon.svg"
      - "casaos.category=Business"
      - "casaos.port=3034"
      - "casaos.author=Tolga Günsal"
    ports:
      - "3034:3000"
    env_file:
      - ./zimaos.env
    volumes:
      - /DATA/stickwerk-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      timeout: 10s
      interval: 30s
      retries: 3
      start_period: 60s

  watchtower:
    container_name: stickwerk-watchtower
    image: containrrr/watchtower:latest
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_POLL_INTERVAL=3600
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_STOPPED=false
      - WATCHTOWER_TIMEOUT=60s
