services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:0.3.0
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "3034:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_PUBLIC_POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_URL: http://pocketbase:8090
      POCKETBASE_ADMIN_EMAIL: ${POCKETBASE_ADMIN_EMAIL}
      POCKETBASE_ADMIN_PASSWORD: ${POCKETBASE_ADMIN_PASSWORD}
      NEXTAUTH_URL: https://sws.guenlab.de
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      NEXT_PUBLIC_SITE_URL: https://sws.guenlab.de
      NEXT_PUBLIC_APP_URL: https://sws.guenlab.de
    depends_on:
      pocketbase:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  pocketbase:
    image: pocketbase/pocketbase:latest
    container_name: stickwerk-pocketbase
    restart: unless-stopped
    ports:
      - "8090:8090"
    volumes:
      - pocketbase-data:/pb/pb_data
      - pocketbase-migrations:/pb/pb_migrations
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8090/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pocketbase-data:
  pocketbase-migrations:
