# =============================================================================
# Stickwerk-Studio — ZimaOS Deployment
# =============================================================================
# Verwendung in der ZimaOS Web UI:
#
# 1. Dieses Compose-File importieren (oder manuell anlegen)
# 2. MINDESTENS diese 3 Umgebungsvariablen setzen:
#      - DATABASE_URL     (z.B. postgresql://user:pass@ip:5432/db)
#      - SESSION_SECRET   (mindestens 32 Zeichen)
#      - ADMIN_PASSWORD   (Login-Passwort für /admin)
# 3. Deploy starten → Image wird automatisch von ghcr.io gepullt
#
# Das Docker-Image wird automatisch bei jedem Push auf main gebaut:
#   https://github.com/tolgaguensal-lab/stickwerk-studio/pkgs/container/stickwerk-studio
# =============================================================================

services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "3034:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000

      # === PostgreSQL (PFLICHT) ===
      # Beispiel: postgresql://casaos:casaos@192.168.178.91:5432/casaos
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL fehlt — PostgreSQL-Verbindungsstring erforderlich}

      # === Admin-Zugang (PFLICHT) ===
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET fehlt — mindestens 32 Zeichen}
      ADMIN_USER: ${ADMIN_USER:-admin@stickwerk-studio.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD fehlt — wähle ein sicheres Passwort}

      # === Öffentliche URL (optional) ===
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://sws.guenlab.de}
      NEXT_PUBLIC_APP_URL: ${SITE_URL:-https://sws.guenlab.de}

      # === E-Mail (optional — ohne SMTP läuft die Seite trotzdem) ===
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
