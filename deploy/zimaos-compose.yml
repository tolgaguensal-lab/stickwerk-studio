# =============================================================================
# Stickwerk-Studio — ZimaOS Docker Compose Deployment
# =============================================================================
# Dieses File ist für die ZimaOS App Store Integration optimiert.
# Auf ZimaOS können die Variablen im App Store UI überschrieben werden.
#
# Für eigenständiges Docker Compose siehe docker-compose.yml (mit PostgreSQL).
# =============================================================================

services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "3034:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000

      # PostgreSQL — Auf ZimaOS separaten DB-Container oder externen Service nutzen
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL ist erforderlich — z.B. postgresql://user:pass@host:5432/db}

      # Auth — Muss在生产中 gesetzt werden!
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET ist erforderlich — mindestens 32 Zeichen}
      ADMIN_USER: ${ADMIN_USER:-admin@stickwerk-studio.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD ist erforderlich}

      # Public URLs
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-https://sws.guenlab.de}
      NEXT_PUBLIC_APP_URL: ${SITE_URL:-https://sws.guenlab.de}

      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
