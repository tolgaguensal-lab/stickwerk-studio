# =============================================================================
# Stickwerk-Studio — ZimaOS Deployment (mit eigener PostgreSQL)
# =============================================================================
# Zero-Config: alle Env-Vars haben Defaults. Einfach importieren → starten.
# Optional überschreibbar via ZimaOS Web UI oder .env-File.
#
# PostgreSQL läuft im gleichen Stack — keine externe DB nötig.
# Daten bleiben bei Updates erhalten (Volume "pgdata").
# =============================================================================

services:
  # ---- PostgreSQL (integriert) ----
  db:
    image: postgres:17-alpine
    container_name: stickwerk-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: stickwerk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stickwerk_secret_2026}
      POSTGRES_DB: stickwerk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickwerk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- Next.js App ----
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "3034:3000"
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000

      # === PostgreSQL (automatisch zum db-Container) ===
      # Überschreiben für externen PostgreSQL-Service
      DATABASE_URL: postgresql://stickwerk:${POSTGRES_PASSWORD:-stickwerk_secret_2026}@db:5432/stickwerk

      # === Admin-Zugang (Zero-Config Defaults) ===
      SESSION_SECRET: ${SESSION_SECRET:-1136803954688f9a32a363737b1960ba40fe4084b2bc5d8232e1ecbcb137f4c9}
      ADMIN_USER: ${ADMIN_USER:-admin@stickwerk-studio.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-gKJtBwhgUAafhU8n}

      # === Öffentliche URL (optional, für SEO) ===
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3034}
      NEXT_PUBLIC_APP_URL: ${SITE_URL:-http://localhost:3034}

      # === Sentry (Error Tracking) ===
      SENTRY_DSN: ${SENTRY_DSN:-https://390985695bc2d6d915f88f5f7a97220b@o4511455077007360.ingest.de.sentry.io/4511523279011920}
      NEXT_PUBLIC_SENTRY_DSN: ${NEXT_PUBLIC_SENTRY_DSN:-https://390985695bc2d6d915f88f5f7a97220b@o4511455077007360.ingest.de.sentry.io/4511523279011920}

      # === E-Mail (optional — ohne SMTP läuft alles trotzdem) ===
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
    driver: local
