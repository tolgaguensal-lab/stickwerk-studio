# =============================================================================
# Stickwerk-Studio — Full-Stack Docker Compose
# =============================================================================
# Startet die komplette Anwendung mit PostgreSQL-Datenbank.
#
# Usage:
#   docker compose up -d
#   → App auf http://localhost:3034
#
# Konfiguration über .env (optional):
#   cp .env.example .env
#   # .env anpassen (Passwörter, Secrets)
#   docker compose --env-file .env up -d
# =============================================================================

services:
  # ---- PostgreSQL ----
  db:
    image: postgres:17-alpine
    container_name: stickwerk-db
    restart: unless-stopped
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: stickwerk
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stickwerk_secret_2026}
      POSTGRES_DB: stickwerk
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stickwerk"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---- Next.js App ----
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    restart: unless-stopped
    ports:
      - "${PORT:-3034}:3000"
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      # PostgreSQL (verbindet sich mit dem db-service oben)
      DATABASE_URL: postgresql://stickwerk:${POSTGRES_PASSWORD:-stickwerk_secret_2026}@db:5432/stickwerk
      # Auth
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET ist erforderlich — mindestens 32 Zeichen}
      ADMIN_USER: ${ADMIN_USER:-admin@stickwerk-studio.de}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD ist erforderlich}
      # Public URLs (für SEO, Links)
      NEXT_PUBLIC_SITE_URL: ${SITE_URL:-http://localhost:3034}
      NEXT_PUBLIC_APP_URL: ${SITE_URL:-http://localhost:3034}
      # SMTP (optional)
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASS: ${SMTP_PASS:-}
      SMTP_FROM: ${SMTP_FROM:-}
      NOTIFY_EMAIL: ${NOTIFY_EMAIL:-}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  pgdata:
    driver: local
