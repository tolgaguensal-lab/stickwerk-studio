<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle (embroidery hoop) -->
  <circle cx="32" cy="34" r="28" fill="none" stroke="#1a3a2a" stroke-width="3"/>
  
  <!-- Hoop clamp at top -->
  <rect x="28" y="3" width="8" height="6" rx="1" fill="#b8960b"/>
  <rect x="30" y="1" width="4" height="3" rx="1" fill="#b8960b"/>
  
  <!-- Letter S -->
  <text x="32" y="42" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#1a3a2a" text-anchor="middle">S</text>
  
  <!-- Needle (diagonal line) -->
  <line x1="20" y1="44" x2="44" y2="18" stroke="#b8960b" stroke-width="2" stroke-linecap="round"/>
  
  <!-- Needle eye -->
  <ellipse cx="44" cy="18" rx="2" ry="3" fill="none" stroke="#b8960b" stroke-width="1.5" transform="rotate(-45 44 18)"/>
  
  <!-- Thread from needle -->
  <path d="M44 18 Q50 24, 48 32 Q46 38, 42 42" fill="none" stroke="#b8960b" stroke-width="1" stroke-dasharray="2,2"/>
</svg>
