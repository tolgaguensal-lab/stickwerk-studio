<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <clipPath id="hoop">
      <circle cx="64" cy="68" r="52"/>
    </clipPath>
  </defs>
  
  <!-- Background -->
  <rect width="128" height="128" fill="#f5f2eb"/>
  
  <!-- Embroidery hoop - outer ring -->
  <circle cx="64" cy="68" r="54" fill="none" stroke="#1a3a2a" stroke-width="4"/>
  <circle cx="64" cy="68" r="50" fill="none" stroke="#1a3a2a" stroke-width="2"/>
  
  <!-- Hoop clamp at top -->
  <rect x="56" y="8" width="16" height="10" rx="2" fill="#b8960b"/>
  <rect x="52" y="4" width="24" height="6" rx="2" fill="#b8960b"/>
  <rect x="60" y="2" width="8" height="4" rx="1" fill="#a0850a"/>
  
  <!-- Letter S - serif style -->
  <text x="64" y="82" font-family="Georgia, 'Times New Roman', serif" font-size="60" font-weight="bold" fill="#1a3a2a" text-anchor="middle" font-style="italic">S</text>
  
  <!-- Needle - diagonal from bottom-left to top-right -->
  <line x1="38" y1="88" x2="90" y2="28" stroke="#b8960b" stroke-width="3" stroke-linecap="round"/>
  
  <!-- Needle eye -->
  <ellipse cx="90" cy="28" rx="4" ry="6" fill="none" stroke="#b8960b" stroke-width="2" transform="rotate(-50 90 28)"/>
  
  <!-- Thread from needle - dashed curve -->
  <path d="M90 28 Q100 40, 96 56 Q92 70, 84 80" fill="none" stroke="#b8960b" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
