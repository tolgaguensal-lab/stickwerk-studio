version: '3.8'

services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always
    volumes:
      - /DATA/AppData/stickwerk-studio/config:/app/config

  db:
    image: postgres:15-alpine
    container_name: stickwerk-db
    environment:
      POSTGRES_USER: stickwerk_user
      POSTGRES_PASSWORD: stickwerk_password
      POSTGRES_DB: stickwerk_db
    volumes:
      - /DATA/AppData/stickwerk-studio/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
