services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    container_name: stickwerk-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://stickwerk_user:${POSTGRES_PASSWORD}@db:5432/stickwerk_db
      - NEXTAUTH_SECRET=${NEXTAUTH_SECRET}
      - NEXTAUTH_URL=https://sws.guenlab.de
    depends_on:
      - db
    restart: always
    volumes:
      - /DATA/AppData/stickwerk-studio/config:/app/config

  db:
    image: postgres:15-alpine
    container_name: stickwerk-db
    environment:
      - POSTGRES_USER=stickwerk_user
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=stickwerk_db
    volumes:
      - /DATA/AppData/stickwerk-studio/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always
