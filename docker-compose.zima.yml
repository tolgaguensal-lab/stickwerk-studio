version: '3.8'

services:
  app:
    image: ghcr.io/tolgaguensal-lab/stickwerk-studio:latest
    ports:
      - "3000:3000"
    env_file:
      - .env
    depends_on:
      - db
    restart: always

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: stickwerk_user
      POSTGRES_PASSWORD: stickwerk_password
      POSTGRES_DB: stickwerk_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: always

volumes:
  postgres_data:
